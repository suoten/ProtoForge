[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# FIXED: P4 - W19 此处 SQLite URL 仅为占位默认值，运行时由 migrations/env.py 通过
# PROTOFORGE_DB_PATH 环境变量覆盖。生产环境应设置 PROTOFORGE_DB_PATH 指向实际数据库。
sqlalchemy.url = sqlite:///data/protoforge.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
