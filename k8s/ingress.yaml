apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: protoforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "protoforge"
spec:
  rules:
    - host: protoforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: protoforge
                port:
                  number: 80
