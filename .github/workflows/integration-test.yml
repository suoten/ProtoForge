name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Unit Tests
        run: python -m pytest tests/ -v --tb=short

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

  integration-test:
    runs-on: ubuntu-latest
    needs: [unit-tests, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ProtoForge
        run: pip install -e "."

      - name: Start ProtoForge Server
        run: |
          python -m uvicorn protoforge.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/protocols; then
              echo "ProtoForge is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "ProtoForge did not start"
          exit 1

      - name: Run Integration Tests
        run: |
          python -c "
          import httpx, asyncio

          async def test():
              base = 'http://localhost:8000/api/v1'
              async with httpx.AsyncClient() as c:
                  r = await c.post(f'{base}/auth/login', json={'username':'admin','password':'admin'})
                  token = r.json()['access_token']
                  h = {'Authorization': f'Bearer {token}'}

                  r = await c.get(f'{base}/protocols', headers=h)
                  assert r.status_code == 200, f'Protocols failed: {r.status_code}'

                  r = await c.get(f'{base}/devices', headers=h)
                  assert r.status_code == 200, f'Devices failed: {r.status_code}'

                  r = await c.get(f'{base}/templates', headers=h)
                  assert r.status_code == 200, f'Templates failed: {r.status_code}'

                  r = await c.get(f'{base}/tests/action-types', headers=h)
                  assert r.status_code == 200 and len(r.json()) > 0

                  r = await c.get(f'{base}/tests/suggestions', headers=h)
                  assert r.status_code == 200

                  print('All integration tests passed!')

          asyncio.run(test())
          "

      - name: Stop ProtoForge Server
        if: always()
        run: pkill -f "uvicorn protoforge" || true
