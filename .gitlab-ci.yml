stages:
  - lint
  - test

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install -e ".[dev,all]"
  script:
    - ruff check protoforge/

unit-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -e ".[dev,all]"
  script:
    - python -m pytest tests/ -v --tb=short --cov=protoforge --cov-report=term-missing

integration-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl && rm -rf /var/lib/apt/lists/*
    - pip install -e ".[all]"
    - python -m uvicorn protoforge.main:app --host 0.0.0.0 --port 8000 &
    - |
      for i in $(seq 1 30); do
        if curl -sf http://localhost:8000/health; then
          echo "ProtoForge is ready"
          break
        fi
        if [ "$i" -eq 30 ]; then
          echo "ProtoForge did not start in time"
          exit 1
        fi
        echo "Waiting... ($i/30)"
        sleep 2
      done
  script:
    - |
      python -c "
      import httpx, asyncio
      async def test():
          base = 'http://localhost:8000/api/v1'
          async with httpx.AsyncClient() as c:
              r = await c.post(f'{base}/auth/login', json={'username':'admin','password':'admin'})
              assert r.status_code == 200, f'Login failed: {r.status_code}'
              token = r.json()['access_token']
              h = {'Authorization': f'Bearer {token}'}
              r = await c.get(f'{base}/protocols', headers=h)
              assert r.status_code == 200
              r = await c.get(f'{base}/devices', headers=h)
              assert r.status_code == 200
              r = await c.get(f'{base}/templates', headers=h)
              assert r.status_code == 200
              print('CI integration test passed!')
      asyncio.run(test())
      "
  after_script:
    - pkill -f "uvicorn protoforge" || true
