services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: protoforge
      POSTGRES_USER: protoforge
      POSTGRES_PASSWORD: ${PROTOFORGE_DB_PASSWORD:-protoforge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protoforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  protoforge:
    build: .
    ports:
      - "8000:8000"
      - "5020:5020"
      - "4840:4840"
      - "1883:1883"
      - "5060:5060"
      - "5060:5060/udp"
      - "47808:47808/udp"
      - "102:102"
      - "8080:8080"
      - "5000:5000"
      - "9600:9600"
      - "44818:44818"
      - "51340:51340"
      - "8193:8193"
      - "7878:7878"
      - "1701:1701"
      - "34964:34964"
      - "34980:34980"
    environment:
      PROTOFORGE_DB_PATH: postgresql://protoforge:${PROTOFORGE_DB_PASSWORD:-protoforge}@postgres:5432/protoforge
      PROTOFORGE_JWT_SECRET: ${PROTOFORGE_JWT_SECRET:-}
      PROTOFORGE_LOG_LEVEL: info
      PROTOFORGE_CORS_ORIGINS: ${PROTOFORGE_CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - protoforge-data:/app/data
    restart: unless-stopped

  protoforge-test:
    build: .
    command: ["sh", "-c", "pip install -e '.[dev]' && python -m pytest tests/ -v --tb=short"]
    environment:
      PROTOFORGE_DB_PATH: postgresql://protoforge:${PROTOFORGE_DB_PASSWORD:-protoforge}@postgres:5432/protoforge_test
      PROTOFORGE_NO_AUTH: "1"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app

volumes:
  postgres-data:
  protoforge-data:
